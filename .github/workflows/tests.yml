name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        laravel: ['11.*', '12.*']
        exclude:
          - php: '8.2'
            laravel: '12.*'

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, sqlite3
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: |
          composer require "illuminate/support:${{ matrix.laravel }}" --no-interaction --no-update
          composer install --no-interaction --prefer-dist --no-progress

      - name: Run Pest tests
        run: vendor/bin/pest --colors=always

      # Advisory for now: the package has pre-existing PHPStan (strict type)
      # and Pint (style) findings to clean up. The Pest suite is the gate.
      # Drop continue-on-error once these are green.
      - name: Run PHPStan
        continue-on-error: true
        run: vendor/bin/phpstan analyse --no-progress

      - name: Run Pint (style check)
        continue-on-error: true
        run: vendor/bin/pint --test
