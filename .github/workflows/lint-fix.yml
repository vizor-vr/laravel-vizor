name: Lint Fix

# Manual one-shot: run Pint in FIX mode and push the result to the branch.
# Exists because the maintainer machine has no local PHP toolchain.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pint-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - run: composer install --no-interaction --prefer-dist
      - run: vendor/bin/pint
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "style: pint auto-fixes"
          git push
