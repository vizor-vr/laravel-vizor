name: Sync Player Version

on:
  repository_dispatch:
    types: [player-release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Player version to sync (e.g. 0.2.0)'
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.event.client_payload.version || inputs.version }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update player version pins
        run: |
          # Config default: 'player_version' => env('VIZOR_PLAYER_VERSION', 'X'),
          sed -i "s/env('VIZOR_PLAYER_VERSION', '[^']*')/env('VIZOR_PLAYER_VERSION', '${{ steps.version.outputs.version }}')/" config/vizor.php
          # Dist manifest version (entries change only on dist-layout changes).
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${{ steps.version.outputs.version }}\"/" player-dist-manifest.json
          # PlayerScriptTest pins the shipped default explicitly.
          sed -i "s/toBe('0\.[0-9.]*')/toBe('${{ steps.version.outputs.version }}')/g; s/player@0\.[0-9.]*\/dist/player@${{ steps.version.outputs.version }}\/dist/g" tests/Feature/PlayerScriptTest.php
          # PlayerScript's runtime fallback default (used when config is absent).
          sed -i "s/config('vizor.player_version', '[^']*')/config('vizor.player_version', '${{ steps.version.outputs.version }}')/" src/Support/PlayerScript.php
          # ConfigTest asserts the shipped default (test name + assertion).
          sed -i "s/player_version of 0\.[0-9.]*/player_version of ${{ steps.version.outputs.version }}/; s/toBe('0\.[0-9.]*')/toBe('${{ steps.version.outputs.version }}')/g" tests/Unit/ConfigTest.php
          # README Configuration Reference row (ConfigTest guards this stays in sync).
          sed -i 's/`player_version` | `VIZOR_PLAYER_VERSION` | `[^`]*`/`player_version` | `VIZOR_PLAYER_VERSION` | `${{ steps.version.outputs.version }}`/' README.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          title: "chore: sync player version to ${{ steps.version.outputs.version }}"
          body: |
            Automated PR to sync the Vizor player CDN version.

            - Updated `player_version` config default to `${{ steps.version.outputs.version }}`
            - Updated player-dist-manifest.json + PlayerScriptTest pins

            Triggered by: ${{ github.event_name }}
          branch: "chore/sync-player-${{ steps.version.outputs.version }}"
          commit-message: "chore: sync player version to ${{ steps.version.outputs.version }}"
